name: Build and Publish to NuGet

on:
  push:
    branches: [ main ]
    paths: 
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '**/*.csproj'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '**/*.csproj'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  id-token: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/VeniceAI.SDK/VeniceAI.SDK.csproj'
  SOLUTION_PATH: 'VeniceAI.sln'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
    
    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore
    
    - name: Run tests (excluding integration tests)
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal --logger trx --collect:"XPlat Code Coverage" --filter "Category!=Integration"
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: .NET Tests
        path: '**/*.trx'
        reporter: dotnet-trx
        fail-on-error: true

  publish-nuget:
    name: Publish to NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
    
    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore
    
    - name: Get project version
      id: get-version
      run: |
        VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" ${{ env.PROJECT_PATH }})
        if [ -z "$VERSION" ]; then
          echo "No version found in project file, using 1.0.0"
          VERSION="1.0.0"
        fi
        echo "version=$VERSION" >> $GITHUBOutput
        echo "Package version: $VERSION"
    
    - name: Check if version exists on NuGet
      id: check-version
      run: |
        PACKAGE_ID="VeniceAI.SDK"
        VERSION="${{ steps.get-version.outputs.version }}"
        
        # Check if this version already exists on NuGet.org
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.nuget.org/v3-flatcontainer/$PACKAGE_ID/$VERSION/$PACKAGE_ID.$VERSION.nupkg")
        
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "exists=true" >> $GITHUBOutput
          echo "Version $VERSION already exists on NuGet.org"
        else
          echo "exists=false" >> $GITHUBOutput
          echo "Version $VERSION does not exist on NuGet.org, proceeding with publish"
        fi
    
    - name: Create NuGet package
      if: steps.check-version.outputs.exists == 'false'
      run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./nupkg
    
    - name: Publish to NuGet.org
      if: steps.check-version.outputs.exists == 'false'
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate \
          --no-symbols
    
    - name: Upload package artifacts
      if: steps.check-version.outputs.exists == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package-v${{ steps.get-version.outputs.version }}
        path: ./nupkg/*.nupkg
        retention-days: 30
    
    - name: Create GitHub Release
      if: steps.check-version.outputs.exists == 'false'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get-version.outputs.version }}
        name: Venice AI .NET SDK v${{ steps.get-version.outputs.version }}
        body: |
          ## 🚀 Venice AI .NET SDK v${{ steps.get-version.outputs.version }}
          
          ### 📦 Installation
          ```bash
          dotnet add package VeniceAI.SDK --version ${{ steps.get-version.outputs.version }}
          ```
          
          ### 📖 Documentation
          - [NuGet Package](https://www.nuget.org/packages/VeniceAI.SDK/${{ steps.get-version.outputs.version }})
          - [GitHub Repository](https://github.com/veniceai/venice-ai-api-sdk)
          - [API Documentation](https://docs.venice.ai)
          
          ### 🔄 Changes
          See [CHANGELOG.md](https://github.com/veniceai/venice-ai-api-sdk/blob/main/CHANGELOG.md) for detailed changes in this release.
          
          ### ✨ Features
          - Chat completions with streaming support
          - Image generation and manipulation
          - Text-to-speech with multiple voices
          - Text embeddings for semantic search
          - Model management and billing information
          - Full async/await support
          - Dependency injection ready
        files: ./nupkg/*.nupkg
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Skip publishing (version exists)
      if: steps.check-version.outputs.exists == 'true'
      run: |
        echo "⚠️ Version ${{ steps.get-version.outputs.version }} already exists on NuGet.org"
        echo "To publish a new version, update the <Version> in ${{ env.PROJECT_PATH }}"
        echo "Current version: ${{ steps.get-version.outputs.version }}"
