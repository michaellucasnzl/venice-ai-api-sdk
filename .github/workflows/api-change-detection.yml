name: Venice AI API Change Detection

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  check-api-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAPI tools
        run: |
          echo "Installing OpenAPI comparison tools..."

          # Try to install swagger-diff (not @apidevtools/swagger-diff)
          if npm install -g swagger-diff; then
            echo "swagger-diff installed successfully"
          else
            echo "Failed to install swagger-diff from npm"
          fi

          # Try to install openapi-diff
          if npm install -g openapi-diff; then
            echo "openapi-diff installed successfully"
          else
            echo "Failed to install openapi-diff from npm"
          fi

          # Check what tools are available
          echo "Available tools:"
          command -v swagger-diff && echo "✓ swagger-diff available" || echo "✗ swagger-diff not available"
          command -v openapi-diff && echo "✓ openapi-diff available" || echo "✗ openapi-diff not available"
          command -v diff && echo "✓ diff available" || echo "✗ diff not available"

      - name: Setup workspace
        run: |
          # Ensure openapi directory exists
          mkdir -p openapi
          echo "✓ Workspace prepared"

      - name: Download latest Venice AI API spec
        run: |
          echo "Attempting to download Venice AI API specification..."

          # Try multiple potential endpoints for the Venice AI API spec
          if curl -sSL -w "%{http_code}" https://api.venice.ai/api/v1/swagger.yaml -o openapi/latest-venice-ai-api.yaml | grep -q "200"; then
            echo "✓ Downloaded from swagger.yaml endpoint"
          elif curl -sSL -w "%{http_code}" https://api.venice.ai/swagger.yaml -o openapi/latest-venice-ai-api.yaml | grep -q "200"; then
            echo "✓ Downloaded from root swagger.yaml endpoint"
          elif curl -sSL -w "%{http_code}" https://api.venice.ai/api/v1/openapi.yaml -o openapi/latest-venice-ai-api.yaml | grep -q "200"; then
            echo "✓ Downloaded from openapi.yaml endpoint"
          elif curl -sSL -w "%{http_code}" https://api.venice.ai/openapi.yaml -o openapi/latest-venice-ai-api.yaml | grep -q "200"; then
            echo "✓ Downloaded from root openapi.yaml endpoint"
          else
            echo "❌ Failed to download API spec from any known endpoint"
            echo "Endpoints tried:"
            echo "  - https://api.venice.ai/api/v1/swagger.yaml"
            echo "  - https://api.venice.ai/swagger.yaml"
            echo "  - https://api.venice.ai/api/v1/openapi.yaml"
            echo "  - https://api.venice.ai/openapi.yaml"

            # Check if we have an existing spec to use as fallback
            if [ -f "openapi/venice-ai-api.yaml" ]; then
              echo "Using existing spec as fallback..."
              cp openapi/venice-ai-api.yaml openapi/latest-venice-ai-api.yaml
            else
              echo "No fallback spec available"
              exit 1
            fi
          fi

          # Validate that we have a valid YAML file
          if [ -f "openapi/latest-venice-ai-api.yaml" ] && [ -s "openapi/latest-venice-ai-api.yaml" ]; then
            echo "✓ Downloaded spec file is valid and non-empty"
            echo "File size: $(wc -c < openapi/latest-venice-ai-api.yaml) bytes"
          else
            echo "❌ Downloaded spec file is invalid or empty"
            exit 1
          fi

      - name: Compare API specifications
        id: compare
        run: |
          set +e  # Don't exit on diff

          # Check if baseline exists
          if [ ! -f "openapi/venice-ai-api.yaml" ]; then
            echo "No baseline spec found. This will be treated as a change."
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Simple file comparison first
          if cmp -s "openapi/venice-ai-api.yaml" "openapi/latest-venice-ai-api.yaml"; then
            echo "Files are identical - no changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Files differ, let's get more detailed comparison
          echo "Files differ, running detailed comparison..."

          # Try openapi-diff first
          if command -v openapi-diff >/dev/null 2>&1; then
            echo "Running openapi-diff..."
            openapi-diff openapi/venice-ai-api.yaml openapi/latest-venice-ai-api.yaml > api-diff-report.txt 2>&1
            OPENAPI_DIFF_EXIT_CODE=$?
          else
            echo "openapi-diff not available"
            OPENAPI_DIFF_EXIT_CODE=1
          fi

          # Try swagger-diff as backup
          if command -v swagger-diff >/dev/null 2>&1; then
            echo "Running swagger-diff..."
            swagger-diff openapi/venice-ai-api.yaml openapi/latest-venice-ai-api.yaml --format json > swagger-diff-report.json 2>&1
            SWAGGER_DIFF_EXIT_CODE=$?
          else
            echo "swagger-diff not available"
            SWAGGER_DIFF_EXIT_CODE=1
          fi

          # If both tools failed, use basic diff
          if [ $OPENAPI_DIFF_EXIT_CODE -ne 0 ] && [ $SWAGGER_DIFF_EXIT_CODE -ne 0 ]; then
            echo "Both tools failed, using basic diff..."
            diff -u openapi/venice-ai-api.yaml openapi/latest-venice-ai-api.yaml > basic-diff-report.txt 2>&1
          fi

          # Since files differ or force update requested, mark as having changes
          if [ "${{ inputs.force_update }}" == "true" ]; then
            echo "Force update requested"
          else
            echo "API changes detected"
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Create a summary of changes
          echo "## API Changes Detected" > change-summary.md
          echo "" >> change-summary.md

          if [ -f "api-diff-report.txt" ]; then
            echo "### OpenAPI Diff Output:" >> change-summary.md
            echo '```' >> change-summary.md
            head -100 api-diff-report.txt >> change-summary.md
            echo '```' >> change-summary.md
            echo "" >> change-summary.md
          fi

          if [ -f "swagger-diff-report.json" ]; then
            echo "### Swagger Diff Output:" >> change-summary.md
            echo '```json' >> change-summary.md
            head -100 swagger-diff-report.json >> change-summary.md
            echo '```' >> change-summary.md
            echo "" >> change-summary.md
          fi

          if [ -f "basic-diff-report.txt" ]; then
            echo "### Basic Diff Output (first 100 lines):" >> change-summary.md
            echo '```diff' >> change-summary.md
            head -100 basic-diff-report.txt >> change-summary.md
            echo '```' >> change-summary.md
          fi

      - name: Upload diff reports as artifacts
        if: steps.compare.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-diff-reports
          path: |
            api-diff-report.txt
            swagger-diff-report.json
            basic-diff-report.txt
            change-summary.md
            openapi/latest-venice-ai-api.yaml

  save-api-spec:
    needs: check-api-changes
    if: needs.check-api-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download diff reports
        uses: actions/download-artifact@v4
        with:
          name: api-diff-reports

      - name: Update baseline API spec
        run: |
          # Copy the latest spec to overwrite the baseline
          if [ -f "openapi/latest-venice-ai-api.yaml" ]; then
            echo "✓ Copying latest spec to baseline..."
            cp openapi/latest-venice-ai-api.yaml openapi/venice-ai-api.yaml
          else
            echo "❌ No latest spec found to copy"
            exit 1
          fi

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            feat: update Venice AI API specification

            Automated update triggered by API change detection workflow.

            Changes detected in Venice AI API specification.

          title: 🤖 Venice AI API Specification Update
          body: |
            ## 🔄 Venice AI API Specification Update

            This PR was automatically generated because changes were detected in the Venice AI API specification.

            ### 📋 Changes Made:
            - ✅ Updated baseline OpenAPI specification (`openapi/venice-ai-api.yaml`)

            ### 📊 API Diff Summary:

            The following changes were detected between the baseline and latest API specifications:

            ```
            $([ -f change-summary.md ] && cat change-summary.md || echo "No detailed diff available. Changes detected via file comparison.")
            ```

            ###  API Spec Information:
            - **Workflow Run**: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Generated on**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
            - **Trigger**: ${{ github.event_name == 'schedule' && 'Scheduled run' || 'Manual trigger' }}

            ---

            > 🤖 This PR was created automatically by the Venice AI API Change Detection workflow.
            > For questions about this automation, check `.github/workflows/api-change-detection.yml`

          branch: automated/api-spec-update-${{ github.run_number }}
          delete-branch: true
          base: main

      - name: Add labels to PR
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr edit ${{ steps.create-pr.outputs.pull-request-number }} --add-label "automated,api-spec-update,needs-review"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
